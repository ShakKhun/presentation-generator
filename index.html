<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Lesson Studio</title>

  <link rel="stylesheet" href="vendor/reveal/reset.css" />
  <link rel="stylesheet" href="vendor/reveal/reveal.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/slides.css" />
  <link rel="stylesheet" href="css/studio.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>AI Lesson Studio</h1>
      <p class="tagline">AI-native ESL / IELTS lesson presentations</p>
    </div>
  </header>

  <main class="app-workspace">
    <section class="panel panel-editor" aria-label="Lesson JSON editor">
      <div class="panel-label">JSON Editor</div>
      <div id="monaco-editor" role="textbox" aria-label="Lesson JSON"></div>
      <div class="panel-toolbar">
        <label for="theme-select">Theme</label>
        <select id="theme-select" aria-label="Presentation theme">
          <option value="">From JSON</option>
          <option value="light-modern">Light Modern</option>
          <option value="dark-academy">Dark Academy</option>
        </select>
        <div class="toolbar-actions">
          <button type="button" class="btn-ghost" id="btn-format" title="Format JSON (Shift+Alt+F)">Format</button>
          <button type="button" class="btn-primary" id="btn-preview">Preview</button>
          <button type="button" class="btn-secondary" id="btn-download">Download</button>
        </div>
        <p id="status-message" role="status" aria-live="polite"></p>
      </div>
    </section>

    <section class="panel panel-preview" aria-label="Presentation preview">
      <div class="panel-label">Presentation Preview</div>
      <div
        id="preview-host"
        tabindex="0"
        title="Click here, then use arrow keys to navigate slides"
      ></div>
    </section>
  </main>

  <script src="vendor/monaco/min/vs/loader.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
